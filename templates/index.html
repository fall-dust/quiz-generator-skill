<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>题库自测系统</title>
<link rel="stylesheet" href="css/style.css">
<!-- 如需引入第三方 JS 库（图表/数学公式/Markdown 渲染等）：
     1. 取消注释下方需要的 <script> 行（本地优先，自动 CDN 回退）
     2. 运行 python js/lib/download-libs.py 下载到本地（确保离线可用） -->
<!--
<script src="js/lib/chart.umd.min.js" onerror="this.outerHTML='<script src=\"https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js\"><\/script>'"></script>
<script src="js/lib/katex.mjs" onerror="this.outerHTML='<script src=\"https://cdn.jsdelivr.net/npm/katex@0/dist/katex.mjs\"><\/script>'"></script>
<script src="js/lib/marked.min.js" onerror="this.outerHTML='<script src=\"https://cdn.jsdelivr.net/npm/marked@15/marked.min.js\"><\/script>'"></script>
-->
</head>
<body>

<div class="app-container">

  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-hd">
      <h1>📚 题库自测</h1>
      <p id="sidebarTotal"></p>
    </div>

    <div class="sidebar-nav" id="sidebarNav">
      <div id="contextLabel" class="sidebar-context-label"></div>
      <div id="chapterList"></div>
    </div>

    <div class="mode-buttons">
      <div class="lbl">🎯 题型练习</div>
      <button class="mode-btn" id="typeBtn_mcq">✏️ 选择题 <span class="type-badge ch-badge"></span></button>
      <button class="mode-btn" id="typeBtn_fill">📝 填空题 <span class="type-badge ch-badge"></span></button>
      <button class="mode-btn" id="typeBtn_essay">📄 简答题 <span class="type-badge ch-badge"></span></button>
      <button class="mode-btn" id="typeBtn_calc">🔢 计算题 <span class="type-badge ch-badge"></span></button>
    </div>

    <div class="mode-buttons">
      <div class="lbl">⚡ 快捷</div>
      <button class="mode-btn" data-mode="random">🎲 随机抽题</button>
      <button class="mode-btn" data-mode="wrong">❌ 错题本</button>
    </div>

    <div class="sidebar-stats" id="sidebarStats"></div>

    <div class="sidebar-actions" id="sidebarActions"></div>

    <div class="theme-toggle">
      <button class="theme-btn" id="themeBtn">🌙</button>
    </div>
  </aside>

  <!-- 主内容 -->
  <div id="contentWrapper">
    <div class="top-bar">
      <button class="hamburger" id="hamburger">☰</button>
      <span class="top-title">题库自测</span>
      <span class="top-mode" id="topMode"></span>
    </div>

    <div id="contentArea"></div>

    <div class="content-footer" id="contentFooter"></div>
  </div>

</div>

<!-- 答题卡面板 -->
<div class="sh-panel" id="sheetPanel">
  <div class="sh-hd">
    <h3>答题卡</h3>
    <span class="sh-x" id="closeSheet">✕</span>
  </div>
  <div class="sh-grid" id="sheetGrid"></div>
  <div class="sh-lg">
    <span><span class="d d-c"></span>正确</span>
    <span><span class="d d-w"></span>错误</span>
    <span><span class="d d-s"></span>未答</span>
  </div>
</div>

<!-- 弹窗容器 -->
<div id="modalContainer"></div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>


<script src="js/questions.js"></script>
<script src="js/bigquestions.js"></script>
<!-- 若要引入第三方库，取消上方注释即可，app.js 保持不变 -->
<script src="js/app.js"></script>
<script src="js/editor.js"></script>
</body>
</html>
