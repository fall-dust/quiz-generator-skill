<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>题库自测系统</title>
<link rel="stylesheet" href="css/style.css">

<!-- KaTeX — 数学公式渲染 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

<!-- Marked — Markdown 渲染 -->
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" crossorigin="anonymous"></script>

<!-- DOMPurify — HTML 安全过滤 -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js" crossorigin="anonymous"></script>

<!-- highlight.js — 代码高亮 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github.min.css" id="hljs-light" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css" id="hljs-dark" disabled crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js" crossorigin="anonymous"></script>

<!-- Quill — 富文本编辑器 (1.3.7 稳定版) -->
<link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js" crossorigin="anonymous"></script>
</head>
<body>

<div class="app-container">

  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-hd">
      <h1>📚 题库自测</h1>
      <p id="sidebarTotal"></p>
    </div>

    <div class="sidebar-nav" id="sidebarNav">
      <div id="contextLabel" class="sidebar-context-label"></div>
      <div id="chapterList"></div>
    </div>

    <div class="mode-buttons">
      <div class="lbl">🎯 题型练习</div>
      <button class="mode-btn" id="typeBtn_mcq">✏️ 选择题 <span class="type-badge ch-badge"></span></button>
      <button class="mode-btn" id="typeBtn_tf">⚖️ 判断题 <span class="type-badge ch-badge"></span></button>
      <button class="mode-btn" id="typeBtn_fill">📝 填空题 <span class="type-badge ch-badge"></span></button>
      <button class="mode-btn" id="typeBtn_essay">📄 简答题 <span class="type-badge ch-badge"></span></button>
      <button class="mode-btn" id="typeBtn_calc">🔢 计算题 <span class="type-badge ch-badge"></span></button>
    </div>

    <div class="mode-buttons">
      <div class="lbl">⚡ 快捷</div>
      <button class="mode-btn" data-mode="random">🎲 随机抽题</button>
      <button class="mode-btn" data-mode="wrong">❌ 错题本</button>
    </div>

    <div class="sidebar-stats" id="sidebarStats"></div>

    <div class="sidebar-actions" id="sidebarActions"></div>

    <div class="theme-toggle">
      <button class="theme-btn" id="themeBtn">🌙</button>
    </div>
  </aside>

  <!-- 主内容 -->
  <div id="contentWrapper">
    <div class="top-bar">
      <button class="hamburger" id="hamburger">☰</button>
      <span class="top-title">题库自测</span>
      <span class="top-mode" id="topMode"></span>
    </div>

    <div id="contentArea"></div>

    <div class="content-footer" id="contentFooter"></div>
  </div>

</div>

<!-- 答题卡面板 -->
<div class="sh-panel" id="sheetPanel">
  <div class="sh-hd">
    <h3>答题卡</h3>
    <span class="sh-x" id="closeSheet">✕</span>
  </div>
  <div class="sh-grid" id="sheetGrid"></div>
  <div class="sh-lg">
    <span><span class="d d-c"></span>正确</span>
    <span><span class="d d-w"></span>错误</span>
    <span><span class="d d-s"></span>未答</span>
  </div>
</div>

<!-- 弹窗容器 -->
<div id="modalContainer"></div>

<!-- Quill 编辑器容器（全局复用） -->
<div id="quillEditorContainer" class="quill-editor-overlay" style="display:none">
  <div class="quill-editor-dialog">
    <div class="quill-editor-header">
      <h3 id="quillEditorTitle">✏️ 编辑题目</h3>
      <button class="quill-editor-close" id="quillEditorClose">✕</button>
    </div>
    <div class="quill-editor-body">
      <div class="quill-editor-field">
        <label class="quill-editor-label">📝 题目内容</label>
        <div id="quillEditorQuestion" class="quill-editor-instance"></div>
      </div>
      <div class="quill-editor-field" id="quillAnswerField">
        <label class="quill-editor-label">✅ 正确答案</label>
        <div id="quillEditorAnswer" class="quill-editor-instance"></div>
      </div>
      <div class="quill-editor-field" id="quillOptionsField" style="display:none">
        <label class="quill-editor-label">📋 选项</label>
        <div id="quillOptionsContainer"></div>
      </div>
      <div class="quill-editor-field" id="quillMcqAnswerField" style="display:none">
        <label class="quill-editor-label">✅ 正确选项</label>
        <div id="quillMcqAnswerSelect"></div>
      </div>
    </div>
    <div class="quill-editor-footer">
      <button class="btn btn-o" id="quillEditorCancel">取消</button>
      <button class="btn btn-d btn-sm" id="quillEditorRestore" style="display:none">↩ 还原原始</button>
      <button class="btn btn-p" id="quillEditorSave">💾 保存修改</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>


<script src="js/questions.js"></script>
<script src="js/bigquestions.js"></script>
<script src="js/app.js"></script>
<script src="js/editor.js"></script>
</body>
</html>
